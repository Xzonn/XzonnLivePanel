<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=2880" />
    <title>Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0f;
        --surface: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.07);
        --accent: #c8a97e;
        --accent2: #7e9dc8;
        --text-primary: #f0ede8;
        --text-secondary: rgba(240, 237, 232, 0.45);
        --text-dim: rgba(240, 237, 232, 0.2);
      }

      html,
      body {
        width: 2880px;
        height: 540px;
        overflow: hidden;
        background: var(--bg);
        font-family: "DM Mono", monospace;
        color: var(--text-primary);
      }

      /* Ambient background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 900px 600px at 15% 50%, rgba(200, 169, 126, 0.06) 0%, transparent 70%),
          radial-gradient(ellipse 700px 500px at 85% 50%, rgba(126, 157, 200, 0.05) 0%, transparent 70%),
          radial-gradient(ellipse 1200px 300px at 50% 50%, rgba(255, 255, 255, 0.015) 0%, transparent 80%);
        pointer-events: none;
        z-index: 0;
      }

      /* Subtle noise texture */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        background-size: 200px 200px;
        pointer-events: none;
        z-index: 0;
        opacity: 0.4;
      }

      .player {
        position: relative;
        z-index: 1;
        width: 2880px;
        height: 540px;
        display: grid;
        grid-template-columns: 200px 1fr 1fr;
        align-items: center;
        gap: 0;
        padding: 0 80px;
      }

      /* ── LEFT: Cover ── */
      .cover-section {
        display: flex;
        align-items: center;
        justify-content: center;
        padding-right: 60px;
      }

      .cover-wrapper {
        position: relative;
        width: 340px;
        height: 340px;
        flex-shrink: 0;
      }

      /* Glow ring */
      .cover-wrapper::before {
        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        background: conic-gradient(
          from 0deg,
          var(--accent),
          var(--accent2),
          var(--accent),
          var(--accent2),
          var(--accent)
        );
        opacity: 0;
        transition: opacity 0.6s ease;
        animation: none;
      }

      .cover-wrapper.playing::before {
        opacity: 0.5;
        animation: ring-spin 8s linear infinite;
      }

      /* Outer shadow ring */
      .cover-wrapper::after {
        content: "";
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        background: transparent;
        box-shadow:
          0 0 60px rgba(200, 169, 126, 0.12),
          0 0 120px rgba(200, 169, 126, 0.06);
      }

      @keyframes ring-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .cover-img {
        width: 340px;
        height: 340px;
        border-radius: 50%;
        object-fit: cover;
        position: relative;
        z-index: 1;
        animation: none;
        border: 1.5px solid var(--border);
        background: #1a1a1f;
      }

      .cover-img.spinning {
        animation: vinyl-spin 12s linear infinite;
      }

      @keyframes vinyl-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Center dot on cover */
      .cover-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: radial-gradient(circle, #1e1e23 40%, #2a2a30 100%);
        border: 1.5px solid rgba(255, 255, 255, 0.12);
        z-index: 2;
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
      }

      /* ── CENTER: Info + Controls ── */
      .info-section {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 0;
        padding: 0 80px 0 40px;
        border-right: 1px solid var(--border);
      }

      .song-meta {
        margin-bottom: 36px;
      }

      .song-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 52px;
        font-weight: 300;
        line-height: 1.1;
        letter-spacing: 0.01em;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 900px;
      }

      .song-artist {
        margin-top: 10px;
        font-size: 15px;
        font-weight: 300;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        opacity: 0.85;
      }

      /* Progress */
      .progress-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .progress-bar-track {
        width: 100%;
        height: 2px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        position: relative;
        cursor: pointer;
      }

      .progress-bar-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        transition: width 1s linear;
        position: relative;
      }

      .progress-bar-fill::after {
        content: "";
        position: absolute;
        right: -4px;
        top: 50%;
        transform: translateY(-50%);
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
        opacity: 0;
        transition: opacity 0.2s;
      }

      .progress-bar-track:hover .progress-bar-fill::after {
        opacity: 1;
      }

      .time-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .time-current {
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.12em;
        color: var(--accent);
      }

      .time-total {
        font-size: 12px;
        font-weight: 300;
        letter-spacing: 0.12em;
        color: var(--text-secondary);
      }

      /* Controls */
      .controls {
        margin-top: 32px;
        display: flex;
        align-items: center;
        gap: 0;
      }

      .play-btn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 1px solid rgba(200, 169, 126, 0.3);
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
      }

      .play-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: radial-gradient(circle at center, rgba(200, 169, 126, 0.15), transparent 70%);
        opacity: 0;
        transition: opacity 0.25s;
      }

      .play-btn:hover::before {
        opacity: 1;
      }
      .play-btn:hover {
        border-color: var(--accent);
        box-shadow: 0 0 24px rgba(200, 169, 126, 0.2);
        transform: scale(1.05);
      }

      .play-btn svg {
        position: relative;
        z-index: 1;
        fill: var(--accent);
        transition: transform 0.15s ease;
      }

      .play-btn:active {
        transform: scale(0.97);
      }

      /* ── RIGHT: Lyrics ── */
      .lyrics-section {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 0 0 80px;
        gap: 0;
      }

      .lyrics-label {
        font-size: 10px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 28px;
      }

      .lyrics-line {
        overflow: hidden;
      }

      .lyrics-original {
        font-family: "Noto Serif JP", serif;
        font-size: 30px;
        font-weight: 300;
        line-height: 1.4;
        color: var(--text-primary);
        letter-spacing: 0.06em;
        transition:
          opacity 0.5s ease,
          transform 0.5s ease;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 1100px;
      }

      .lyrics-divider {
        width: 32px;
        height: 1px;
        background: linear-gradient(90deg, var(--accent), transparent);
        margin: 18px 0;
        opacity: 0.5;
      }

      .lyrics-translated {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-size: 22px;
        font-weight: 300;
        line-height: 1.5;
        color: var(--text-secondary);
        letter-spacing: 0.04em;
        transition:
          opacity 0.5s ease,
          transform 0.5s ease;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 1100px;
      }

      .lyrics-original.fade,
      .lyrics-translated.fade {
        opacity: 0;
        transform: translateY(8px);
      }

      /* Idle state placeholder */
      .lyrics-placeholder {
        font-size: 13px;
        letter-spacing: 0.15em;
        color: var(--text-dim);
      }

      /* Equalizer bars (playing indicator) */
      .eq-bars {
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 16px;
        margin-left: 16px;
        opacity: 0;
        transition: opacity 0.4s;
      }

      .eq-bars.active {
        opacity: 1;
      }

      .eq-bar {
        width: 3px;
        border-radius: 1px;
        background: var(--accent);
        animation: none;
      }

      .eq-bars.active .eq-bar:nth-child(1) {
        animation: eq1 0.8s ease-in-out infinite;
      }
      .eq-bars.active .eq-bar:nth-child(2) {
        animation: eq2 0.6s ease-in-out infinite 0.1s;
      }
      .eq-bars.active .eq-bar:nth-child(3) {
        animation: eq3 0.9s ease-in-out infinite 0.2s;
      }

      @keyframes eq1 {
        0%,
        100% {
          height: 4px;
        }
        50% {
          height: 14px;
        }
      }
      @keyframes eq2 {
        0%,
        100% {
          height: 10px;
        }
        50% {
          height: 5px;
        }
      }
      @keyframes eq3 {
        0%,
        100% {
          height: 6px;
        }
        50% {
          height: 12px;
        }
      }

      /* Subtle scan line effect */
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(200, 169, 126, 0.08), transparent);
        animation: scan 6s ease-in-out infinite;
        pointer-events: none;
        z-index: 10;
      }

      @keyframes scan {
        0% {
          top: 0;
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          top: 540px;
          opacity: 0;
        }
      }

      /* WS status */
      .ws-status {
        position: fixed;
        bottom: 14px;
        right: 80px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--text-dim);
        z-index: 5;
      }

      .ws-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #4a4a55;
        transition: background 0.3s;
      }

      .ws-dot.connected {
        background: #7fc97e;
        box-shadow: 0 0 6px rgba(127, 201, 126, 0.5);
      }
      .ws-dot.error {
        background: #c97e7e;
      }
    </style>
  </head>
  <body>
    <div class="scanline"></div>

    <div class="player">
      <!-- Cover -->
      <div class="cover-section">
        <div class="cover-wrapper" id="coverWrapper">
          <img class="cover-img" id="coverImg" src="" alt="cover" />
          <div class="cover-dot"></div>
        </div>
      </div>

      <!-- Info + Controls -->
      <div class="info-section">
        <div class="song-meta">
          <div class="song-title" id="songTitle">——</div>
          <div style="display: flex; align-items: center; gap: 8px">
            <div class="song-artist" id="songArtist">——</div>
            <div class="eq-bars" id="eqBars">
              <div class="eq-bar"></div>
              <div class="eq-bar"></div>
              <div class="eq-bar"></div>
            </div>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-bar-track" id="progressTrack">
            <div class="progress-bar-fill" id="progressFill" style="width: 0%"></div>
          </div>
          <div class="time-row">
            <span class="time-current" id="timeCurrent">00:00</span>
            <span class="time-total" id="timeTotal">--:--</span>
          </div>
        </div>

        <div class="controls">
          <button class="play-btn" id="playBtn" onclick="togglePlay()">
            <svg id="playIcon" width="20" height="20" viewBox="0 0 20 20">
              <polygon points="6,3 17,10 6,17" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Lyrics -->
      <div class="lyrics-section">
        <div class="lyrics-label">Lyrics</div>
        <div class="lyrics-line">
          <div class="lyrics-original" id="lyricsOriginal">—</div>
        </div>
        <div class="lyrics-divider" id="lyricsDivider"></div>
        <div class="lyrics-line">
          <div class="lyrics-translated" id="lyricsTranslated"></div>
        </div>
      </div>
    </div>

    <!-- WS status indicator -->
    <div class="ws-status">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">DISCONNECTED</span>
    </div>

    <script>
      /* ─── State ─── */
      let isPlaying = false;
      let ws = null;
      let reconnectTimer = null;
      let lastLyrics = { original: "", translated: "" };

      /* ─── Elements ─── */
      const coverImg = document.getElementById("coverImg");
      const coverWrapper = document.getElementById("coverWrapper");
      const songTitle = document.getElementById("songTitle");
      const songArtist = document.getElementById("songArtist");
      const progressFill = document.getElementById("progressFill");
      const timeCurrent = document.getElementById("timeCurrent");
      const timeTotal = document.getElementById("timeTotal");
      const playIcon = document.getElementById("playIcon");
      const eqBars = document.getElementById("eqBars");
      const lyricsOrig = document.getElementById("lyricsOriginal");
      const lyricsTrans = document.getElementById("lyricsTranslated");
      const lyricsDivider = document.getElementById("lyricsDivider");
      const wsDot = document.getElementById("wsDot");
      const wsLabel = document.getElementById("wsLabel");

      /* ─── Helpers ─── */
      function timeToSec(t) {
        if (!t || !t.includes(":")) return 0;
        const [m, s] = t.split(":").map(Number);
        return m * 60 + s;
      }

      function setPlayState(playing) {
        isPlaying = playing;
        // Cover spin
        if (playing) {
          coverImg.classList.add("spinning");
          coverWrapper.classList.add("playing");
          eqBars.classList.add("active");
        } else {
          coverImg.classList.remove("spinning");
          coverWrapper.classList.remove("playing");
          eqBars.classList.remove("active");
        }
        // Button icon
        playIcon.innerHTML = playing
          ? '<rect x="4" y="3" width="4.5" height="14" rx="1"/><rect x="11.5" y="3" width="4.5" height="14" rx="1"/>'
          : '<polygon points="6,3 17,10 6,17"/>';
      }

      function updateProgress(current, total) {
        const cur = timeToSec(current);
        const tot = timeToSec(total);
        const pct = tot > 0 ? Math.min((cur / tot) * 100, 100) : 0;
        progressFill.style.width = pct + "%";
        timeCurrent.textContent = current || "00:00";
        timeTotal.textContent = total || "--:--";
      }

      function updateLyrics(original, translated) {
        const hasOrig = original && original.trim();
        const hasTrans = translated && translated.trim();

        // Fade out
        lyricsOrig.classList.add("fade");
        lyricsTrans.classList.add("fade");

        setTimeout(() => {
          lyricsOrig.textContent = hasOrig ? original : "";
          lyricsTrans.textContent = hasTrans ? translated : "";
          lyricsDivider.style.opacity = hasOrig && hasTrans ? "0.5" : "0";
          lyricsOrig.classList.remove("fade");
          lyricsTrans.classList.remove("fade");
        }, 300);
      }

      /* ─── Apply incoming data ─── */
      function applyData(data) {
        // Title & artist
        if (data.title !== undefined) songTitle.textContent = data.title || "——";
        if (data.artist !== undefined) songArtist.textContent = data.artist || "——";

        // Cover
        if (data.cover) {
          if (coverImg.src !== data.cover) {
            coverImg.style.opacity = "0";
            coverImg.src = data.cover;
            coverImg.onload = () => {
              coverImg.style.transition = "opacity 0.6s";
              coverImg.style.opacity = "1";
            };
            coverImg.onerror = () => {
              coverImg.style.opacity = "0.3";
            };
          }
        }

        // Progress
        if (data.current !== undefined || data.total !== undefined) {
          updateProgress(data.current, data.total);
        }

        // Play state
        if (data.isPlaying !== undefined) setPlayState(data.isPlaying);

        // Lyrics
        if (data.original !== undefined || data.translated !== undefined) {
          if (data.original !== lastLyrics.original || data.translated !== lastLyrics.translated) {
            updateLyrics(data.original, data.translated);
            lastLyrics = { original: data.original, translated: data.translated };
          }
        }
      }

      /* ─── Toggle (local) ─── */
      function togglePlay() {
        setPlayState(!isPlaying);
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ action: isPlaying ? "play" : "pause" }));
        }
      }

      /* ─── WebSocket ─── */
      function connectWS() {
        const wsUrl = "wss://www.www.localhost:32810/ws/output/lyric_163";
        try {
          ws = new WebSocket(wsUrl);
        } catch (e) {
          scheduleReconnect();
          return;
        }

        ws.onopen = () => {
          wsDot.className = "ws-dot connected";
          wsLabel.textContent = "CONNECTED";
        };

        ws.onmessage = (e) => {
          try {
            const data = JSON.parse(e.data);
            applyData(data);
          } catch (err) {
            console.warn("WS parse error:", err);
          }
        };

        ws.onclose = () => {
          wsDot.className = "ws-dot";
          wsLabel.textContent = "DISCONNECTED";
          scheduleReconnect();
        };

        ws.onerror = () => {
          wsDot.className = "ws-dot error";
          wsLabel.textContent = "ERROR";
        };
      }

      function scheduleReconnect() {
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connectWS, 3000);
      }

      /* ─── Demo data (shown before WS connects) ─── */
      applyData({});

      /* Init WS */
      connectWS();
    </script>
  </body>
</html>
